name: Vue CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Type check
        run: npm run type-check
        working-directory: frontend

      - name: Build
        run: npm run build-only
        working-directory: frontend
